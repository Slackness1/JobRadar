# ==================== 硬性过滤条件 (Hard Filters) ====================
hard_filters:
  # 地点过滤（保留这些地点，空列表表示不限制）
  location:
    include: []  # 如需限制：["北京", "上海", "深圳", "杭州"]
    exclude: []  # 排除地点：["海外", "境外"]
  
  # 语言要求
  language:
    require_english: false  # 是否要求英语
    require_chinese: true   # 是否要求中文描述
  
  # 工作年限
  experience:
    min_years: 0     # 最低年限
    max_years: 3     # 最高年限（应届生/ junior）
  
  # 必须包含的关键词（岗位必须包含其一）
  must_include: []
    # 示例：["校招", "应届", "实习", "2025", "2026"]
  
  # 排除关键词（包含则直接排除）
  exclude_keywords:
    # 不相关职能
    sales:
      - "销售代表"
      - "销售经理"
      - "销售专员"
      - "客户经理"
