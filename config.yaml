# ==================== 评分权重配置 ====================
scoring:
  # 子分数权重（总和应为 1.0）
  weights:
    keyword_match: 0.30      # 关键词匹配分数
    track_fit: 0.25          # 赛道匹配度
    skill_relevance: 0.20    # 技能相关度
    location_match: 0.10     # 地点匹配
    recency: 0.10            # 发布时间新鲜度
    company_tier: 0.05       # 公司级别
  
  # 关键词分数计算
  keyword_scoring:
    core_multiplier: 3.0     # 核心关键词权重倍数
    normal_multiplier: 1.0   # 普通关键词权重倍数
    max_score: 50            # 关键词部分最高分
  
  # 时间新鲜度
  recency:
    same_day: 100       # 当天发布
    within_3_days: 80   # 3天内
    within_7_days: 60   # 7天内
    within_14_days: 40  # 14天内
    older: 20           # 更早

  # 公司级别加分
  company_tier:
    tier1:  # 顶级公司
      bonus: 15
      companies:
        - "腾讯"
        - "阿里巴巴"
        - "字节跳动"
        - "美团"
        - "拼多多"
        - "华为"
        - "BCG"
        - "麦肯锡"
        - "贝恩"
        - "德勤"
        - "普华永道"
        - "安永"
        - "毕马威"
        - "中金"
        - "中信证券"
        - "华泰证券"
        - "英伟达"
        - "OpenAI"
    tier2:  # 知名公司
      bonus: 10
      companies:
        - "Shopee"
        - "小红书"
        - "快手"
        - "京东"
        - "百度"
        - "网易"
        - "滴滴"
        - "小米"
        - "B站"
        - "中国电信"
        - "中国移动"
        - "中国联通"
        - "长鑫存储"
        - "中诚信"
    tier3:  # 央企国企
      bonus: 5
      keywords:
        - "央企"
        - "国企"
        - "集团"

# ==================== 阈值配置 ====================
thresholds:
  # 总分阈值
  total_score_min: 30        # 总分低于此值不展示
  
  # 单赛道阈值（低于此值不进入该赛道）
  track_min_scores:
    data_analysis: 15
    tech_consulting: 12
    ai_pm: 12
    investment_research: 12
    power_trading: 10
  
  # 热门推荐阈值
  hot_recommend_min: 60      # 进入"热门推荐"的最低分
  
  # 最多展示数量
  max_display_per_track: 50  # 每个赛道最多展示数量
  max_hot_recommend: 20      # 热门推荐最多数量

# ==================== 输出配置 ====================
output:
  # CSV 输出字段
  csv_fields:
    - "job_id"
    - "company"
    - "company_type_industry"
    - "company_tags"
    - "department"
    - "job_title"
    - "location"
    - "major_req"
    - "job_req"
    - "job_duty"
    - "publish_date"
    - "deadline"
    - "detail_url"
    # 新增评分字段
    - "matched_tracks"
    - "total_score"
    - "track_scores"
    - "matched_keywords"
    - "skill_tags"
  
  # 报告配置
  report:
    show_score_breakdown: true   # 是否显示分数明细
    show_skill_tags: true        # 是否显示技能标签
    group_by_track: true         # 是否按赛道分组
